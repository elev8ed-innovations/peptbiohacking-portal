# Netlify config — PeptBiohacking Portal (peptbiohacking.mx)
# Deploy Previews: auto-built for every branch pushed to GitHub
# Preview URL pattern: https://{branch-name}--pept-app.netlify.app

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Production
[context.production]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Deploy Preview: every branch push auto-builds with full env
[context.deploy-preview]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Branch Deploy: same config
[context.branch-deploy]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"